<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>God Mode — ROAST AND DONUT</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = { theme: { extend: { colors: { "primary": "#e62a19", "border-gray": "#E5E5E5", "neutral-gray": "#737373" } } } }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-weight: 400 !important;
        }

        body {
            font-family: "Plus Jakarta Sans", ui-rounded, sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: #F4F4F4;
            color: #737373;
            background-image: radial-gradient(#E5E5E5 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .interactive-element {
            color: #737373;
            transition: color 0.2s linear;
            cursor: pointer;
        }

        .interactive-element:hover {
            color: #000;
        }

        .bento-card {
            background-color: #FFFFFF;
            border: 1px solid #E5E5E5;
            border-radius: 16px;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.2s ease;
        }

        .bento-card:hover {
            transform: translateY(-4px);
            border-color: #737373;
        }

        .link-grow {
            position: relative;
        }

        .link-grow::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            width: 0;
            height: 1px;
            background: #000;
            transition: width 0.3s ease, left 0.3s ease;
        }

        .link-grow:hover::after {
            width: 100%;
            left: 0;
        }

        .skeleton {
            background: #F5F5F5;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }

        .skeleton::after {
            content: "";
            position: absolute;
            inset: 0;
            transform: translateX(-100%);
            background-image: linear-gradient(90deg, rgba(255, 255, 255, 0) 0, rgba(255, 255, 255, 0.4) 20%, rgba(255, 255, 255, 0.6) 60%, rgba(255, 255, 255, 0));
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            100% {
                transform: translateX(100%);
            }
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-entry {
            animation: fadeSlideUp 0.5s ease forwards;
            opacity: 0;
        }

        .dot-online {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #28CD41;
            box-shadow: 0 0 8px rgba(40, 205, 65, 0.4);
            display: inline-block;
        }

        .dot-offline {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #737373;
            display: inline-block;
        }

        .dot-banned {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #FFCC00;
            box-shadow: 0 0 8px rgba(255, 204, 0, 0.4);
            display: inline-block;
        }

        .tab-active {
            color: #000;
            border-bottom: 1px solid #000;
        }
    </style>
</head>

<body class="min-h-screen">
    <header
        class="fixed top-0 left-0 right-0 z-50 bg-[#F4F4F4]/80 backdrop-blur-md border-b border-border-gray px-6 py-4 flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-3 interactive-element"><span
                class="material-symbols-outlined text-primary text-2xl">coffee</span><span
                class="text-xl tracking-tight text-slate-900">GOD MODE</span></a>
        <a href="dashboard.html" class="text-sm interactive-element link-grow">← Exit God Mode</a>
    </header>

    <main class="max-w-7xl mx-auto pt-28 pb-20 px-6">
        <!-- Admin Tabs -->
        <div class="flex gap-6 mb-6 border-b border-border-gray pb-3 animate-entry">
            <button class="text-sm interactive-element tab-active" data-tab="overview"
                onclick="showTab('overview')">Overview</button>
            <button class="text-sm interactive-element" data-tab="users" onclick="showTab('users')">Users</button>
            <button class="text-sm interactive-element" data-tab="reports" onclick="showTab('reports')">Reports</button>
            <button class="text-sm interactive-element" data-tab="audit" onclick="showTab('audit')">Audit Log</button>
        </div>

        <!-- ═══ OVERVIEW TAB ═══ -->
        <section id="tab-overview">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8" id="statsGrid">
                <div class="bento-card p-6 animate-entry" style="animation-delay:0.05s"><span
                        class="text-xs uppercase tracking-widest text-neutral-gray block mb-3">Total Users</span>
                    <p class="text-3xl text-slate-900" id="statUsers">—</p>
                </div>
                <div class="bento-card p-6 animate-entry" style="animation-delay:0.1s"><span
                        class="text-xs uppercase tracking-widest text-neutral-gray block mb-3">Total Roasts</span>
                    <p class="text-3xl text-slate-900" id="statRoasts">—</p>
                </div>
                <div class="bento-card p-6 animate-entry" style="animation-delay:0.15s"><span
                        class="text-xs uppercase tracking-widest text-neutral-gray block mb-3">New Users (24h)</span>
                    <p class="text-3xl text-slate-900" id="statNew">—</p>
                </div>
                <div class="bento-card p-6 animate-entry" style="animation-delay:0.2s"><span
                        class="text-xs uppercase tracking-widest text-neutral-gray block mb-3">NSFW Flags</span>
                    <p class="text-3xl text-slate-900" id="statNSFW">—</p>
                </div>
            </div>
            <!-- Heat Map -->
            <div class="bento-card p-6 animate-entry" style="animation-delay:0.25s">
                <h2 class="text-sm text-slate-900 mb-4">Roast Heat Map</h2>
                <div id="heatMapGrid" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
            </div>
        </section>

        <!-- ═══ USERS TAB ═══ -->
        <section id="tab-users" class="hidden">
            <div id="userTable" class="space-y-3">
                <div class="skeleton" style="height: 60px;"></div>
                <div class="skeleton" style="height: 60px;"></div>
            </div>
        </section>

        <!-- ═══ REPORTS TAB ═══ -->
        <section id="tab-reports" class="hidden">
            <div id="reportList" class="space-y-3">
                <div class="skeleton" style="height: 60px;"></div>
            </div>
        </section>

        <!-- ═══ AUDIT TAB ═══ -->
        <section id="tab-audit" class="hidden">
            <div id="auditList" class="space-y-3">
                <div class="skeleton" style="height: 60px;"></div>
            </div>
        </section>
    </main>

    <script>
        const API = window.location.origin;
        const token = localStorage.getItem('rd_token');
        if (!token) window.location.href = 'login.html';
        const headers = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };

        function statusDot(label) {
            if (label === 'banned') return '<span class="dot-banned" title="Banned"></span>';
            if (label === 'online') return '<span class="dot-online" title="Online"></span>';
            return '<span class="dot-offline" title="Offline"></span>';
        }

        function showTab(tab) {
            ['overview', 'users', 'reports', 'audit'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.toggle('hidden', t !== tab);
                document.querySelector(`[data-tab="${t}"]`).classList.toggle('tab-active', t === tab);
            });
            if (tab === 'users') loadUsers();
            if (tab === 'reports') loadReports();
            if (tab === 'audit') loadAudit();
        }

        // Overview
        async function loadOverview() {
            try {
                const [statsRes, heatRes] = await Promise.all([
                    fetch(`${API}/api/admin/stats`, { headers }),
                    fetch(`${API}/api/admin/heat-map`, { headers })
                ]);
                if (statsRes.status === 403) { alert('Admin access required.'); window.location.href = 'dashboard.html'; return; }
                const stats = await statsRes.json();
                const heat = await heatRes.json();

                const s = stats.stats || {};
                document.getElementById('statUsers').textContent = s.total_users || '0';
                document.getElementById('statRoasts').textContent = s.total_roasts || '0';
                document.getElementById('statNew').textContent = s.new_users_24h || '0';
                document.getElementById('statNSFW').textContent = s.total_nsfw_content || '0';

                const heatGrid = document.getElementById('heatMapGrid');
                heatGrid.innerHTML = (heat.heatMap || []).map(h => `
                    <div class="bg-[#F5F5F5] border border-border-gray rounded-lg p-4 text-center">
                        <p class="text-xs uppercase tracking-widest text-neutral-gray mb-1">${h.country || '?'}</p>
                        <p class="text-2xl text-slate-900">${h.roast_count}</p>
                        <p class="text-[10px] text-neutral-gray mt-1">${h.total_engagement || 0} engagement</p>
                    </div>
                `).join('');
            } catch (err) { console.error('Overview error:', err); }
        }

        // Users (from v_admin_user_control_center)
        async function loadUsers() {
            try {
                const res = await fetch(`${API}/api/admin/users`, { headers });
                const data = await res.json();
                const table = document.getElementById('userTable');
                table.innerHTML = (data.users || []).map((u, i) => `
                    <div class="bento-card p-4 flex items-center justify-between animate-entry" style="animation-delay:${i * 0.03}s">
                        <div class="flex items-center gap-3">
                            ${statusDot(u.status_label)}
                            <div>
                                <span class="text-sm text-slate-900">${u.email}</span>
                                <div class="text-[10px] text-neutral-gray mt-0.5">
                                    ${u.report_count > 0 ? `<span class="text-[#e62a19]">${u.report_count} reports</span> · ` : ''}
                                    ${u.times_blocked_by_others > 0 ? `${u.times_blocked_by_others} blocks · ` : ''}
                                    ${u.is_shadow_banned ? '<span class="text-[#FFCC00]">Shadow Banned</span> · ' : ''}
                                    ${u.status_label}
                                </div>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="banUser('${u.id}', ${!u.is_banned})" class="text-xs interactive-element px-3 py-1 border border-border-gray rounded-lg hover:border-[#e62a19] hover:text-[#e62a19]">
                                ${u.is_banned ? 'Unban' : 'Ban'}
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (err) { console.error('Users error:', err); }
        }

        async function banUser(id, ban) {
            const reason = ban ? prompt('Reason for ban:') : 'Reinstated';
            if (reason === null) return;
            await fetch(`${API}/api/admin/users/${id}/ban`, { method: 'PATCH', headers, body: JSON.stringify({ is_banned: ban, reason }) });
            loadUsers();
        }

        // Reports
        async function loadReports() {
            try {
                const res = await fetch(`${API}/api/admin/reports`, { headers });
                const data = await res.json();
                const list = document.getElementById('reportList');
                const reports = data.reports || [];
                if (reports.length === 0) { list.innerHTML = '<div class="bento-card p-8 text-center"><p class="text-sm text-neutral-gray">No reports.</p></div>'; return; }
                list.innerHTML = reports.map((r, i) => `
                    <div class="bento-card p-4 animate-entry" style="animation-delay:${i * 0.03}s">
                        <div class="flex items-center justify-between">
                            <div>
                                <span class="text-xs uppercase tracking-widest text-[#e62a19]">${r.reason}</span>
                                <p class="text-sm text-slate-900 mt-1">${r.post_title || 'Untitled post'}</p>
                                <p class="text-[10px] text-neutral-gray mt-1">by ${r.author_email || '?'} · reported by ${r.reported_by || '?'}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="resolveReport('${r.report_id}', 'resolved')" class="text-xs interactive-element px-3 py-1 border border-border-gray rounded-lg hover:bg-[#28CD41] hover:text-white hover:border-[#28CD41]">Resolve</button>
                                <button onclick="resolveReport('${r.report_id}', 'dismissed')" class="text-xs interactive-element px-3 py-1 border border-border-gray rounded-lg">Dismiss</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) { console.error('Reports error:', err); }
        }

        async function resolveReport(id, status) {
            await fetch(`${API}/api/admin/reports/${id}`, { method: 'PATCH', headers, body: JSON.stringify({ status }) });
            loadReports();
        }

        // Audit Log
        async function loadAudit() {
            try {
                const [actRes, auditRes] = await Promise.all([
                    fetch(`${API}/api/admin/actions`, { headers }),
                    fetch(`${API}/api/admin/audit`, { headers })
                ]);
                const actions = await actRes.json();
                const audit = await auditRes.json();
                const list = document.getElementById('auditList');
                const combined = [
                    ...(actions.actions || []).map(a => ({ type: 'action', ...a })),
                    ...(audit.audit || []).map(a => ({ type: 'security', ...a }))
                ].sort((a, b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, 100);

                list.innerHTML = combined.map((e, i) => `
                    <div class="bento-card p-4 animate-entry" style="animation-delay:${i * 0.02}s">
                        <div class="flex items-center justify-between">
                            <div>
                                <span class="text-[10px] uppercase tracking-widest ${e.type === 'security' ? 'text-[#FFCC00]' : 'text-neutral-gray'}">${e.type === 'security' ? e.event_type : e.action_performed}</span>
                                <p class="text-xs text-neutral-gray mt-1">${e.admin_email || e.details || '—'}</p>
                            </div>
                            <div class="text-right">
                                <span class="text-[10px] text-neutral-gray">${new Date(e.created_at).toLocaleString()}</span>
                                ${e.ip_address ? `<p class="text-[10px] text-neutral-gray font-mono">${e.ip_address}</p>` : ''}
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) { console.error('Audit error:', err); }
        }

        loadOverview();
    </script>
</body>

</html>
