<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password — ROAST AND DONUT</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-weight: 400 !important;
        }

        body {
            font-family: "Plus Jakarta Sans", ui-rounded, "SF Pro Rounded", sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: #F4F4F4;
            color: #737373;
            background-image: radial-gradient(#E5E5E5 1px, transparent 1px);
            background-size: 24px 24px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .interactive-element {
            color: #737373;
            transition: color 0.2s linear;
            cursor: pointer;
        }

        .interactive-element:hover {
            color: #000;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-entry {
            animation: fadeSlideUp 0.5s ease forwards;
            opacity: 0;
        }
    </style>
</head>

<body>
    <main class="w-full max-w-sm px-6">
        <div class="text-center mb-10 animate-entry">
            <a href="index.html" class="inline-flex items-center gap-3 interactive-element" aria-label="Home">
                <span class="material-symbols-outlined text-[#e62a19] text-3xl">coffee</span>
                <span class="text-2xl tracking-tight text-slate-900">ROAST AND DONUT</span>
            </a>
        </div>

        <div class="bg-white border border-[#E5E5E5] rounded-2xl p-8 animate-entry" style="animation-delay: 0.1s;">
            <h1 class="text-xl text-slate-900 text-center mb-1">Reset password</h1>
            <p class="text-sm text-[#737373] text-center mb-8">Enter your email and we'll send a recovery link.</p>

            <form id="forgotForm" class="space-y-5" novalidate>
                <div>
                    <label for="email"
                        class="text-xs uppercase tracking-widest text-[#737373] mb-1.5 block">Email</label>
                    <input id="email" name="email" type="email" required autocomplete="email"
                        class="w-full border border-[#E5E5E5] rounded-lg px-4 py-2.5 text-sm text-slate-900 bg-[#F5F5F5] focus:outline-none focus:ring-1 focus:ring-[#e62a19]/30 placeholder:text-[#737373]/50"
                        placeholder="you@example.com" />
                </div>
                <button type="submit" id="submitBtn"
                    class="w-full bg-[#e62a19] text-white py-2.5 rounded-lg text-sm hover:bg-[#e62a19]/90 transition-colors">
                    Send Recovery Link
                </button>
            </form>

            <!-- Success state (hidden by default) -->
            <div id="successState" class="hidden text-center py-4">
                <span class="material-symbols-outlined text-[#28CD41] text-3xl mb-3 block">check_circle</span>
                <p class="text-sm text-[#737373]">If an account exists with that email, a recovery link has been sent.
                </p>
            </div>
        </div>

        <p class="text-xs text-[#737373] text-center mt-6 animate-entry" style="animation-delay: 0.2s;">
            <a href="login.html" class="interactive-element">Back to login</a>
        </p>
    </main>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', (e) => {
            e.preventDefault();
            // In production this would call an API endpoint.
            // For now we show the success state to demonstrate the flow.
            document.getElementById('forgotForm').classList.add('hidden');
            document.getElementById('successState').classList.remove('hidden');
        });
    </script>
</body>

</html>
