<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Age Restricted — ROAST AND DONUT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-weight: 400 !important;
        }

        body {
            font-family: "Plus Jakarta Sans", ui-rounded, "SF Pro Rounded", sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: #F4F4F4;
            color: #737373;
            background-image: radial-gradient(#E5E5E5 1px, transparent 1px);
            background-size: 24px 24px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-entry {
            animation: fadeSlideUp 0.5s ease forwards;
            opacity: 0;
        }
    </style>
</head>

<body>
    <main class="text-center max-w-xs px-6 animate-entry">
        <span class="material-symbols-outlined text-[#e62a19] text-5xl mb-6 block">block</span>
        <h1 class="text-2xl text-slate-900 mb-3">Access Restricted</h1>
        <p class="text-sm text-[#737373] mb-8 leading-relaxed">
            ROAST AND DONUT is a 21+ platform. Valid age identification is required for entry.
        </p>
        <a href="index.html" class="text-xs text-[#737373] hover:text-black transition-colors">Return to landing
            page</a>
    </main>
</body>

</html>
